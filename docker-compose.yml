version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.7.3-python3.10
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./spark_jobs:/opt/airflow/spark_jobs
  depends_on:
    - postgres

services:
  # -------------------------------------
  # BASE DE DONNÉES : POSTGRESQL
  # -------------------------------------
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  # -------------------------------------
  # GRAFANA (Indentation corrigée)
  # -------------------------------------
  grafana:
    image: grafana/grafana:12.2.8
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_METRICS_ENABLED: "true"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    # depends_on:  # <-- Commenté car vous n'avez pas encore de service 'prometheus'
    #   prometheus:
    #     condition: service_started
    restart: unless-stopped
    networks:
      - bigdata

    # -------------------------------------
  # OBJECT STORAGE : MINIO (S3 Compatible)
  # -------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio_pipeline
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    ports:
      - "9005:9000" # API : mappé sur 9005 car le 9000 est pris par HDFS
      - "9002:9001" # Console Web (Interface graphique)
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata

  # -------------------------------------
  # MESSAGE BROKER : KAFKA (KRaft mode)
  # -------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # -------------------------------------
  # DATA LAKE : HADOOP HDFS
  # -------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=datalake
    ports:
      - "9870:9870"
      - "9000:9000"

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      - namenode

  # -------------------------------------
  # TRAITEMENT DISTRIBUÉ : SPARK
  # -------------------------------------
  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./spark_jobs:/opt/spark/jobs

  spark-worker:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark_jobs:/opt/spark/jobs

  # -------------------------------------
  # ORCHESTRATION : AIRFLOW
  # -------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@gmail.com"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8081:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# -------------------------------------
# VOLUMES & NETWORKS (Ajoutés pour Grafana)
# -------------------------------------
volumes:
  grafana_data:
  minio_data:

networks:
  bigdata: